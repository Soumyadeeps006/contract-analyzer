spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/contracts_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dummy}
      chat:
        model: gpt-4o-mini
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: contracts
security:
  api-key: my-secret-key
logging:
  level:
    root: INFO
    com.example.contract: DEBUG
